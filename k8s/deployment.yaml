apiVersion: apps/v1
kind: Deployment
metadata:
  name: crossplane-agent
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crossplane-agent
  template:
    metadata:
      labels:
        app: crossplane-agent
    spec:
      serviceAccountName: crossplane-agent  
      containers:
        - name: crossplane-agent
          image: shilucloud/crossplane-agent:0.0.3
          ports:
            - containerPort: 8080
          args: ["--http", "0.0.0.0:8080"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: crossplane-agent
  namespace: default
spec:
  selector:
    app: crossplane-agent
  ports:
    - port: 8080
      targetPort: 8080
