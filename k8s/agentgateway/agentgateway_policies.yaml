apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: crossplane-mcp-access-logs
  namespace: agentgateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-proxy
  frontend:
    accessLog:
      filter: "true"   # log all requests
      attributes:
        add:
          - name: mcp.tool
            expression: mcp.tool
          - name: http.status
            expression: string(response.code)
          - name: duration_ms
            expression: string(request.duration)
