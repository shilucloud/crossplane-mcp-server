apiVersion: v1
kind: ServiceAccount
metadata:
  name: crossplane-agent
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-agent
rules:
  # read all crossplane resources
  - apiGroups:
      - apiextensions.crossplane.io
      - pkg.crossplane.io
      - ops.crossplane.io
      - protection.crossplane.io
    resources: ["*"]
    verbs: ["get", "list", "watch"]

  # read all CRDs (for MR discovery)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]

  # read dynamic resources (XRs, MRs — any group)
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

  # events
  - apiGroups: [""]
    resources: ["events", "secrets", "pods"]
    verbs: ["get", "list", "watch"]

  # annotate reconcile (only write operation)
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-agent
subjects:
  - kind: ServiceAccount
    name: crossplane-agent
    namespace: default
