name: CD

on:
  push:
    tags:
      - 'v*'

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE: shilucloud/crossplane-mcp-server
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: ${{ github.repository_owner }}/crossplane-mcp-server

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get tag
        id: get_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set clean version
        id: version
        run: |
          TAG=${{ steps.get_tag.outputs.TAG }}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update image tag in values.yaml
        uses: mikefarah/yq@v4.52.5
        env:
          IMAGE_TAG: ${{ steps.version.outputs.VERSION }}
        with:
          cmd: |
            yq -i '.image.tag = strenv(IMAGE_TAG)' charts/crossplane-mcp-server/values.yaml

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Docker Hub)
        id: meta-docker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}

      - name: Extract metadata (GHCR)
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta-docker.outputs.tags }}
            ${{ steps.meta-ghcr.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o dist/crossplane-mcp-server-linux-amd64 ./cmd/server
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o dist/crossplane-mcp-server-linux-arm64 ./cmd/server

      - name: Create checksums
        run: |
          cd dist
          sha256sum crossplane-mcp-server-linux-amd64 > crossplane-mcp-server-linux-amd64.sha256
          sha256sum crossplane-mcp-server-linux-arm64 > crossplane-mcp-server-linux-arm64.sha256

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          helm package charts/crossplane-mcp-server \
            --version $VERSION \
            --app-version $VERSION

          mv crossplane-mcp-server-$VERSION.tgz dist/

      - name: Push Helm chart to GHCR (OCI)
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          helm registry login ${{ env.GHCR_REGISTRY }} \
            -u ${{ github.actor }} \
            -p ${{ secrets.GITHUB_TOKEN }}

          helm push dist/crossplane-mcp-server-$VERSION.tgz \
            oci://${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/helm

      - name: Commit Helm repo (GitHub Pages)
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin main
          git checkout main

          mkdir -p docs
          cp dist/crossplane-mcp-server-$VERSION.tgz docs/

          helm repo index docs \
            --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }} \
            --merge docs/index.yaml || \
          helm repo index docs \
            --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

          git add docs/
          git commit -m "Update Helm repo for $VERSION" || echo "No changes to commit"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(steps.get_tag.outputs.TAG, '-') }}
          files: |
            dist/crossplane-mcp-server-linux-amd64
            dist/crossplane-mcp-server-linux-amd64.sha256
            dist/crossplane-mcp-server-linux-arm64
            dist/crossplane-mcp-server-linux-arm64.sha256
            dist/crossplane-mcp-server-${{ steps.version.outputs.VERSION }}.tgz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}